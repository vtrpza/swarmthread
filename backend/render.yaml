services:
  - type: web
    name: swarmthread-api
    runtime: python
    buildCommand: uv sync --frozen
    startCommand: uv run uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: swarmthread-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false

  - type: worker
    name: swarmthread-worker
    runtime: python
    buildCommand: uv sync --frozen
    startCommand: uv run python -m app.worker.main
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: swarmthread-db
          property: connectionString
      - key: OPENROUTER_API_KEY
        sync: false
      - key: LANGFUSE_PUBLIC_KEY
        sync: false
      - key: LANGFUSE_SECRET_KEY
        sync: false

databases:
  - name: swarmthread-db
    databaseName: swarmthread
    user: swarmthread